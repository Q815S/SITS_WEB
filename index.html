<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIDEV SITS 2026</title>
    <style>
        /* 1. 기본 폰트 설정 (내용용) */
        @font-face {
            font-family: 'SMTOWN-Regular'; 
            src: url('regular.ttf') format('truetype'); 
            font-weight: normal;
        }

        /* 2. 로고 폰트 설정 (로고용) */
        @font-face {
            font-family: 'SMTOWN-Bold'; 
            src: url('bold.ttf') format('truetype'); 
            font-weight: bold;
        }

        /* 기본 초기화 및 텍스트/이미지 선택, 롱탭 방지 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh; 
            font-family: 'SMTOWN-Regular', 'Pretendard', -apple-system, sans-serif; 
            background-color: #fff;
            overflow: hidden;
            
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            -khtml-user-select: none; 
            -moz-user-select: none; 
            -ms-user-select: none; 
            user-select: none; 
        }

        /* 1. 스플래시 화면 */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; 
            height: 100vh;
            height: 100dvh; 
            background-color: #223055; 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-in-out;
        }

        /* 스플래시 텍스트 로고 스타일 */
        .splash-text-logo {
            font-family: 'SMTOWN-Bold', sans-serif;
            font-size: 3.5rem; 
            color: #ffffff;
            letter-spacing: 2px;
        }

        /* 2. 메인 컨텐츠 래퍼 */
        #main-content {
            display: none; 
            flex-direction: column;
            width: 100%;
            height: 100vh;
            height: 100dvh; 
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        /* 3. 최상단 헤더 */
        header {
            flex: 0 0 auto; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70px; 
            background-color: #223055; 
            box-sizing: border-box;
        }

        /* 헤더 텍스트 로고 스타일 */
        .header-text-logo {
            font-family: 'SMTOWN-Bold', sans-serif;
            font-size: 1.8rem; 
            color: #ffffff;
            letter-spacing: 1px;
        }

        /* 4. 카드 컨테이너 */
        .card-container {
            flex: 1 1 auto; 
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        
        /* 5. 개별 카드 공통 설정 */
        .card {
            flex: 1; 
            display: block; 
            width: 100%;
            text-decoration: none; 
            position: relative; 
            box-sizing: border-box; 
            transition: opacity 0.2s; 
        }

        .card:hover, .card:active {
            opacity: 0.85; 
        }

        /* 텍스트 위치 및 스타일 설정 */
        .text-en {
            position: absolute;
            top: 24px;
            left: 24px;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .text-ko {
            position: absolute;
            bottom: 24px;
            right: 24px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        /* --- 6. 카드별 색상 커스텀 --- */
        .card-1 { background-color: #223055; }
        .card-1 .text-en, .card-1 .text-ko { color: #ffb8ca; }

        .card-2 { background-color: #ffb8ca; }
        .card-2 .text-en, .card-2 .text-ko { color: #000000; }

        .card-3 { background-color: #b0b7c0; }
        .card-3 .text-en, .card-3 .text-ko { color: #000000; }

        .card-4 { background-color: #223055; }
        .card-4 .text-en, .card-4 .text-ko { color: #ffb8ca; }

    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;" onselectstart="return false;">

    <div id="splash-screen">
        <div class="splash-text-logo">AIDEV</div>
    </div>

    <div id="main-content">
        
        <header>
            <div class="header-text-logo">AIDEV</div>
        </header>

        <main class="card-container">
            <a href="https://www.hyundai.com" target="_blank" class="card card-1">
                <span class="text-en">SITS 2026</span>
                <span class="text-ko">SITS 2026</span>
            </a>

            <a href="https://docs.google.com/spreadsheets/d/1kV092ilSvxSZKygnTZZyPze9TLeMXVhYHWHfYb1lL2M/edit?usp=sharing" target="_blank" class="card card-2">
                <span class="text-en">TIME TABLE</span>
                <span class="text-ko">시간표</span>
            </a>

            <a href="https://www.cheesebutton.io/vote/issue-election/69be6ad101e9f5999971ac2b/intro?utm_source=share_link&utm_medium=referral" target="_blank" class="card card-3">
                <span class="text-en">VOTE</span>
                <span class="text-ko">투표</span>
            </a>

            <a href="https://youtu.be/6LE-Srn1UUo" target="_blank" class="card card-4">
                <span class="text-en">YOUTUBE LIVE</span>
                <span class="text-ko">유튜브 라이브</span>
            </a>
        </main>

    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const main = document.getElementById('main-content');
                
                splash.style.opacity = '0';
                
                main.style.display = 'flex';
                setTimeout(() => {
                    main.style.opacity = '1';
                }, 50);

                setTimeout(() => {
                    splash.style.display = 'none';
                }, 500); 
            }, 1500); 
        });
    </script>
</body>
</html>
